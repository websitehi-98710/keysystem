<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1c1c1c;
            color: #e8e8e8;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 8px 12px;
        }

        .android-icon {
            width: 55px;
            height: 55px;
            margin-bottom: 4px;
            margin-top: 4px;
        }

        .android-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .description {
            font-size: 15px;
            color: #e0e0e0;
            line-height: 1.5;
            margin-bottom: 2px;
        }

        .url {
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
        }

        .error-code {
            font-size: 15px;
            color: #a0a0a0;
            margin-top: 4px;
            font-family: Consolas, "Courier New", monospace;
            letter-spacing: 0.2px;
        }

        .error-code .domain {
            color: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="android-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 2C26.5 2 28.5 3.5 29 5.5C28 5 26.5 4.5 24.5 4.5C22.5 4.5 21 5 20 5.5C20.5 3.5 22.5 2 24 2Z" fill="#A4C639"/>
            <path d="M32 9C32 9 30 7 24 7C18 7 16 9 16 9L14 7C14 7 16 5 24 5C32 5 34 7 34 7L32 9Z" fill="#A4C639"/>
            <rect x="9" y="12" width="30" height="22" rx="3" fill="#A4C639"/>
            <rect x="13" y="34" width="4" height="8" rx="2" fill="#A4C639"/>
            <rect x="31" y="34" width="4" height="8" rx="2" fill="#A4C639"/>
            <circle cx="18" cy="20" r="2.5" fill="#1C1C1C"/>
            <circle cx="30" cy="20" r="2.5" fill="#1C1C1C"/>
            <rect x="22" y="24" width="4" height="6" rx="1" fill="#1C1C1C"/>
            <path d="M14 28L11 32" stroke="#A4C639" stroke-width="2" stroke-linecap="round"/>
            <path d="M34 28L37 32" stroke="#A4C639" stroke-width="2" stroke-linecap="round"/>
            <circle cx="11" cy="12" r="2" fill="#A4C639"/>
            <circle cx="37" cy="12" r="2" fill="#A4C639"/>
        </svg>
    </div>

    <h1>Webpage not available</h1>

    <p class="description">
        The webpage at <span class="url">https://keysystem-3py.pages.dev/</span> could not be loaded because:
    </p>

    <p class="error-code">
        <span class="domain">net</span>::ERR_NAME_NOT_RESOLVED
    </p>
</body>
</html>
